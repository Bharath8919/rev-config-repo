
server.port=8080

eureka.client.service-url.defaultZone=http://localhost:8761/eureka

spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

spring.cloud.gateway.routes[0].id=user-service
spring.cloud.gateway.routes[0].uri=lb://USER-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**
spring.cloud.gateway.routes[0].filters[0]=CircuitBreaker=name=userServiceCB,fallbackUri=forward:/fallback/user

spring.cloud.gateway.routes[1].id=vault-service
spring.cloud.gateway.routes[1].uri=lb://VAULT-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/vault/**

spring.cloud.gateway.routes[2].id=generator-service
spring.cloud.gateway.routes[2].uri=lb://GENERATOR-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/generator/**

spring.cloud.gateway.routes[3].id=security-service
spring.cloud.gateway.routes[3].uri=lb://SECURITY-SERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path=/security/**

spring.cloud.gateway.routes[4].id=notification-service
spring.cloud.gateway.routes[4].uri=lb://NOTIFICATION-SERVICE
spring.cloud.gateway.routes[4].predicates[0]=Path=/notifications/**
